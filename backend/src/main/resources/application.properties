# FinanApp Stock Trader - Application Configuration

spring.application.name=stock-trader

# SQL Server connection - localhost with Windows Integrated Security
# Requires mssql-jdbc_auth DLL on java.library.path or system PATH
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=finanapp;integratedSecurity=true;encrypt=true;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# No username/password needed - uses Windows identity of the JVM process

# Spring Data JDBC
spring.sql.init.mode=never

# Thymeleaf
spring.thymeleaf.cache=false

# Server
server.port=9296
